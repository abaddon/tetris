<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tris — Lobby</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    gap: 1rem; padding: 2rem; margin: 0;
  }
  header {
    display: flex; gap: 1rem; align-items: center; justify-content: center; flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 1.5rem; }
  #user-info { font-size: 0.95rem; }
  button {
    padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer;
    border-radius: 4px; border: 1px solid #888; background: transparent; color: inherit;
  }
  a.header-link {
    padding: 0.5rem 1rem; font-size: 1rem;
    border-radius: 4px; border: 1px solid #888; background: transparent; color: inherit;
    text-decoration: none;
  }
  a.header-link:hover, a.header-link:focus { outline: 2px solid #888; }
  #lobby-section { display: flex; flex-direction: column; gap: 0.75rem; align-items: center; width: 22rem; max-width: 100%; }
  #match-panel { display: none; flex-direction: column; gap: 0.5rem; align-items: center; border: 1px solid #888; border-radius: 6px; padding: 1rem; width: 100%; }
  #match-panel.visible { display: flex; }
  #match-code-display { font-size: 2rem; font-weight: 700; letter-spacing: 0.1em; }
  #copy-row { display: flex; gap: 0.5rem; align-items: center; }
  #waiting-label { font-size: 0.95rem; }
  #status { font-size: 0.95rem; color: #c00; min-height: 1.2em; }
  #join-section { display: flex; flex-direction: column; gap: 0.5rem; align-items: center; width: 100%; }
  #join-row { display: flex; gap: 0.5rem; }
  input {
    padding: 0.4rem 0.6rem; font-size: 1rem; border-radius: 4px;
    border: 1px solid #888; background: transparent; color: inherit;
    text-transform: uppercase; width: 7rem;
  }
</style>
</head>
<body>
  <header>
    <h1>Tris</h1>
    <span id="user-info"></span>
    <a id="leaderboard-link" class="header-link" href="/leaderboard.html">Leaderboard</a>
    <button id="logout-btn" type="button">Log out</button>
  </header>
  <main>
    <div id="lobby-section">
      <button id="create-match-btn" type="button">Create match</button>

      <div id="match-panel" role="region" aria-label="Match waiting area">
        <div id="match-code-display" aria-label="Match code"></div>
        <div id="copy-row">
          <span>Share this code with your opponent</span>
          <button id="copy-btn" type="button">Copy code</button>
        </div>
        <div id="waiting-label" aria-live="polite">Waiting for opponent to join…</div>
        <div id="difficulty-row" style="display:flex;gap:0.5rem;align-items:center;">
          <label for="difficulty-select">Difficulty</label>
          <select id="difficulty-select">
            <option value="trivial">Trivial</option>
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
            <option value="expert">Expert</option>
            <option value="showcase">Showcase</option>
          </select>
        </div>
        <button id="vs-computer-btn" type="button">Play vs Computer</button>
      </div>

      <div id="join-section">
        <div id="join-row">
          <input id="join-code" type="text" maxlength="5" placeholder="XXXXX" aria-label="Match code to join" />
          <button id="join-btn" type="button">Join match</button>
        </div>
      </div>

      <div id="status" aria-live="polite"></div>
    </div>
  </main>
  <script>
    (function () {
      var DIFFICULTY_KEY = 'tris_difficulty';
      var ALLOWED_DIFFICULTIES = ['trivial', 'easy', 'medium', 'hard', 'expert', 'showcase'];

      var difficultySelect = document.getElementById('difficulty-select');

      // AC-3: Restore difficulty from localStorage on page load
      (function () {
        var stored;
        try { stored = localStorage.getItem(DIFFICULTY_KEY); } catch (e) { stored = null; }
        var val = stored && ALLOWED_DIFFICULTIES.indexOf(stored) !== -1 ? stored : 'medium';
        difficultySelect.value = val;
        if (val !== stored) {
          try { localStorage.setItem(DIFFICULTY_KEY, val); } catch (e) {}
        }
      })();

      // AC-2: Persist difficulty to localStorage on change
      difficultySelect.addEventListener('change', function () {
        try { localStorage.setItem(DIFFICULTY_KEY, difficultySelect.value); } catch (e) {}
      });

      var statusEl = document.getElementById('status');
      var userInfoEl = document.getElementById('user-info');
      var matchPanel = document.getElementById('match-panel');
      var matchCodeDisplay = document.getElementById('match-code-display');
      var waitingLabel = document.getElementById('waiting-label');
      var currentMatchCode = '';

      fetch('/api/me').then(function (r) {
        if (!r.ok) { window.location.href = '/login.html'; return null; }
        return r.json();
      }).then(function (data) {
        if (!data) return;
        userInfoEl.textContent = 'Logged in as ' + data.username;
      }).catch(function () {
        window.location.href = '/login.html';
      });

      document.getElementById('logout-btn').addEventListener('click', function () {
        fetch('/api/logout', { method: 'POST' }).then(function () {
          window.location.href = '/login.html';
        });
      });

      document.getElementById('create-match-btn').addEventListener('click', function () {
        statusEl.textContent = '';
        fetch('/api/matches', { method: 'POST' }).then(function (r) {
          return r.json().then(function (data) { return { ok: r.ok, data: data }; });
        }).then(function (res) {
          if (res.ok) {
            currentMatchCode = res.data.code;
            matchCodeDisplay.textContent = res.data.code;
            matchPanel.classList.add('visible');
            waitingLabel.textContent = 'Waiting for opponent to join…';
          } else {
            statusEl.textContent = res.data.error || 'Failed to create match';
          }
        }).catch(function () {
          statusEl.textContent = 'Network error';
        });
      });

      document.getElementById('vs-computer-btn').addEventListener('click', function () {
        statusEl.textContent = '';
        var selectedDifficulty = difficultySelect.value;
        fetch('/api/matches/' + currentMatchCode + '/vs-computer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ difficulty: selectedDifficulty }),
        }).then(function (r) {
          return r.json().then(function (data) { return { ok: r.ok, data: data }; });
        }).then(function (res) {
          if (res.ok) {
            var diff = res.data.difficulty || selectedDifficulty;
            window.location.href = '/game.html?code=' + currentMatchCode + '&role=X&mode=computer&difficulty=' + diff;
          } else {
            statusEl.textContent = res.data.error || 'Failed to start vs computer';
          }
        }).catch(function () {
          statusEl.textContent = 'Network error';
        });
      });

      document.getElementById('copy-btn').addEventListener('click', function () {
        var code = matchCodeDisplay.textContent;
        if (!code) return;
        navigator.clipboard.writeText(code).then(function () {
          statusEl.textContent = 'Code copied!';
        }).catch(function () {
          statusEl.textContent = 'Could not copy — code: ' + code;
        });
      });

      document.getElementById('join-btn').addEventListener('click', function () {
        var code = document.getElementById('join-code').value.trim().toUpperCase();
        if (!code) { statusEl.textContent = 'Enter a match code'; return; }
        statusEl.textContent = '';
        fetch('/api/matches/' + code + '/join', { method: 'POST' }).then(function (r) {
          return r.json().then(function (data) { return { ok: r.ok, data: data }; });
        }).then(function (res) {
          if (res.ok) {
            window.location.href = '/game.html?code=' + res.data.code + '&role=' + res.data.role;
          } else {
            statusEl.textContent = res.data.error || 'Could not join match';
          }
        }).catch(function () {
          statusEl.textContent = 'Network error';
        });
      });
    })();
  </script>
</body>
</html>
