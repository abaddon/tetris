<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tris — Leaderboard</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    gap: 1rem; padding: 2rem; margin: 0;
  }
  header {
    display: flex; gap: 1rem; align-items: center; justify-content: center; flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 1.5rem; }
  #user-info { font-size: 0.95rem; }
  a.header-link {
    padding: 0.5rem 1rem; font-size: 1rem;
    border-radius: 4px; border: 1px solid #888; background: transparent; color: inherit;
    text-decoration: none;
  }
  a.header-link:hover, a.header-link:focus { outline: 2px solid #888; }
  main {
    display: flex; flex-direction: column; align-items: center;
    gap: 0.75rem; width: 22rem; max-width: 100%;
  }
  #placeholder {
    border: 1px solid #888; border-radius: 6px; padding: 1.25rem;
    width: 100%; text-align: center; font-size: 1rem;
  }
  #placeholder-title { font-weight: 600; margin-bottom: 0.5rem; }
  #placeholder-body { opacity: 0.85; font-size: 0.95rem; }
</style>
</head>
<body>
  <header>
    <h1>Tris — Leaderboard</h1>
    <span id="user-info"></span>
    <a id="back-to-lobby" class="header-link" href="/lobby.html">Back to lobby</a>
  </header>
  <main>
    <div id="placeholder" role="region" aria-label="Leaderboard placeholder">
      <div id="placeholder-title">Coming soon</div>
      <div id="placeholder-body">No games scored yet. Once scoring lands, the top players will appear here.</div>
    </div>
  </main>
  <script>
    (function () {
      var userInfoEl = document.getElementById('user-info');
      fetch('/api/me').then(function (r) {
        if (!r.ok) { window.location.href = '/login.html'; return null; }
        return r.json();
      }).then(function (data) {
        if (!data) return;
        userInfoEl.textContent = 'Logged in as ' + data.username;
      }).catch(function () {
        window.location.href = '/login.html';
      });
    })();
  </script>
</body>
</html>
